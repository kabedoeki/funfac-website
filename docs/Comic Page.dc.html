<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #16181a; }
    a { color: #8FE3E3; text-decoration: none; }
    a:hover { color: #b6efef; text-decoration: underline; }
    ::selection { background: #8FE3E3; color: #101214; }
  </style>
</helmet>

<div data-screen-label="Comic Page" style="font-family: 'JetBrains Mono', monospace; background: #16181a; color: #F1F2F3; min-height: 100vh; padding: 24px 56px 64px; box-sizing: border-box;">

  <!-- Breadcrumb -->
  <div style="max-width:1800px; margin:0 auto 20px; font-size:12px; letter-spacing:0.08em; color:#6b7175;">D - PAGE</div>

  <!-- Logo -->
  <div style="max-width:1800px; margin:0 auto 28px;">
    <div style="width:56px; height:56px; border-radius:10px; background:#0c0d0e; border:1px solid #2a2d2f; display:flex; align-items:center; justify-content:center;">
      <svg width="34" height="34" viewBox="0 0 34 34">
        <circle cx="17" cy="17" r="13" fill="none" stroke="#8FE3E3" stroke-width="2.5"/>
        <text x="17" y="21" text-anchor="middle" font-family="JetBrains Mono" font-weight="800" font-size="10" fill="#8FE3E3">FUN</text>
      </svg>
    </div>
  </div>

  <!-- Body -->
  <div style="max-width:1800px; margin:0 auto; display:grid; grid-template-columns: 44px 260px 1fr 260px; gap:20px; align-items:start;">

    <!-- Back button -->
    <div style="width:44px; height:44px; border-radius:6px; background:#0c0d0e; border:1px solid #2a2d2f; display:flex; align-items:center; justify-content:center; font-size:18px;">←</div>

    <!-- Left: Info panel -->
    <div style="background:#1c1f21; border:1px solid #2a2d2f; border-radius:10px; overflow:hidden; display:flex; flex-direction:column; min-height:640px;">
      <div style="height:5px; background:linear-gradient(90deg, #F1F2F3 0%, #F1F2F3 30%, transparent 30%);"></div>
      <div style="padding:20px 22px; flex:1; display:flex; flex-direction:column;">
        <div style="background:#0c0d0e; border-radius:4px; padding:5px 12px; font-size:11.5px; font-weight:600; letter-spacing:0.04em; display:inline-block; align-self:flex-start; margin-bottom:18px;">{{ meta.date }}</div>
        <div style="font-size:26px; font-weight:700; line-height:1.3; margin-bottom:22px;">{{ meta.title }}</div>
        <div style="font-size:14px; color:#9BA1A5; line-height:1.75;">{{ meta.description }}</div>
        <div style="flex:1;"></div>
        <div style="text-align:center; font-size:13px; color:#5c6266; letter-spacing:0.04em; padding-top:20px;">Scroll down<br/>to read.<br/>↓</div>
      </div>
    </div>

    <!-- Center: Comic page -->
    <div style="background:#8a8f92; border-radius:4px; padding:28px; display:flex; flex-direction:column; gap:14px; min-height:900px;">
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
        <sc-for list="{{ topPanels }}" as="p" hint-placeholder-count="3">
          <div style="background: repeating-linear-gradient(45deg, #75797c 0 10px, #6d7174 10px 20px); aspect-ratio: 1/1.1; border:1px solid #5c6063; display:flex; align-items:flex-end; padding:8px; box-sizing:border-box;">
            <div style="font-size:10px; color:#3a3d3f; letter-spacing:0.04em;">PANEL PLACEHOLDER</div>
          </div>
        </sc-for>
      </div>
      <div style="background: repeating-linear-gradient(45deg, #75797c 0 10px, #6d7174 10px 20px); height:220px; border:1px solid #5c6063; display:flex; align-items:flex-end; padding:10px; box-sizing:border-box;">
        <div style="font-size:10px; color:#3a3d3f; letter-spacing:0.04em;">WIDE PANEL PLACEHOLDER</div>
      </div>
      <div style="background: repeating-linear-gradient(45deg, #75797c 0 10px, #6d7174 10px 20px); flex:1; min-height:400px; border:1px solid #5c6063; display:flex; align-items:flex-end; padding:10px; box-sizing:border-box;">
        <div style="font-size:10px; color:#3a3d3f; letter-spacing:0.04em;">FULL PAGE PANEL PLACEHOLDER</div>
      </div>
    </div>

    <!-- Right: Tags panel -->
    <div style="background:#1c1f21; border:1px solid #2a2d2f; border-radius:10px; overflow:hidden; display:flex; flex-direction:column; min-height:640px;">
      <div style="height:5px; background:linear-gradient(90deg, #F1F2F3 0%, #F1F2F3 30%, transparent 30%);"></div>
      <div style="padding:20px 22px; flex:1; display:flex; flex-direction:column;">
        <div style="font-size:24px; font-weight:700; margin-bottom:18px;">Tags</div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <sc-for list="{{ tags }}" as="t" hint-placeholder-count="4">
            <div style="background:#0c0d0e; border:1px solid #2a2d2f; border-radius:6px; padding:11px 0; text-align:center; font-weight:700; font-size:14px;">{{ t }}</div>
          </sc-for>
        </div>
        <div style="flex:1;"></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <div style="background:#0c0d0e; border:1px solid #2a2d2f; border-radius:6px; padding:12px 0; text-align:center; font-weight:700; font-size:14px;">← Prev</div>
          <div style="background:#0c0d0e; border:1px solid #2a2d2f; border-radius:6px; padding:12px 0; text-align:center; font-weight:700; font-size:14px;">Next →</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align:center; margin-top:48px; font-size:14px; letter-spacing:0.1em; color:#4a4f52;">Find. Understand. Neutralize.</div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      meta: {
        date: "May 1 2026",
        title: "Celebratory Karaoke, (Morphine x Morgane)",
        description: "The Entity side hosted a karaoke party to celebrate their milestone on controlling Director's adaptation... and a certain chemistry... bloomed.",
      },
      topPanels: [1, 2, 3],
      tags: ["Dr. Morphine", "Dr. Morgane", "Comic", "Romance"],
    };
  }
}

</script>
</body>
</html>
